<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline animation -->
    <linearGradient id="scanline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f7ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f7ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00f7ff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0,-1" to="0,1" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0f1c"/>

  <!-- Outer frame -->
  <rect x="10" y="10" width="880" height="300" rx="10" fill="none" stroke="#00f7ff" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Title -->
  <text x="50%" y="40" text-anchor="middle" fill="#00f7ff" font-size="20" font-family="monospace" filter="url(#glow)">
    PC MEDICALIST SYSTEM
  </text>

  <!-- Status -->
  <text x="40" y="80" fill="#00f7ff" font-size="14" font-family="monospace">
    STATUS: ONLINE
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </text>

  <text x="40" y="100" fill="#00f7ff" font-size="14" font-family="monospace">
    NODE: ACTIVE
  </text>

  <!-- Animated graph bars -->
  <rect x="100" y="200" width="20" height="0" fill="#00f7ff">
    <animate attributeName="height" from="0" to="80" dur="1.5s" fill="freeze"/>
    <animate attributeName="y" from="200" to="120" dur="1.5s" fill="freeze"/>
  </rect>

  <rect x="140" y="200" width="20" height="0" fill="#00f7ff">
    <animate attributeName="height" from="0" to="120" dur="2s" fill="freeze"/>
    <animate attributeName="y" from="200" to="80" dur="2s" fill="freeze"/>
  </rect>

  <rect x="180" y="200" width="20" height="0" fill="#00f7ff">
    <animate attributeName="height" from="0" to="60" dur="1.2s" fill="freeze"/>
    <animate attributeName="y" from="200" to="140" dur="1.2s" fill="freeze"/>
  </rect>

  <!-- Pulsing core -->
  <circle cx="750" cy="160" r="20" fill="#00f7ff" filter="url(#glow)">
    <animate attributeName="r" values="20;30;20" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Data lines -->
  <line x1="300" y1="250" x2="600" y2="250" stroke="#00f7ff" stroke-width="1">
    <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Scanline overlay -->
  <rect width="100%" height="100%" fill="url(#scanline)" />

</svg>
